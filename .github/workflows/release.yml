name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  # softprops/action-gh-release has no Node 24 release yet
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package tarball
        run: npm pack

      - name: Generate SBOM
        run: npx @cyclonedx/cdxgen@latest -t npm --required-only -o sbom.json

      - name: Attest npm tarball with SBOM
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2.4.0
        with:
          subject-path: rewelo-*.tgz
          sbom-path: sbom.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push to GHCR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg APP_VERSION="$VERSION" \
            --cache-to type=inline \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            --push \
            .

      - name: Export OCI tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg APP_VERSION="$VERSION" \
            --cache-from "$IMAGE:$VERSION" \
            --output type=oci,dest=rewelo-mcp-"$VERSION"-oci.tar \
            .
          gzip rewelo-mcp-"$VERSION"-oci.tar

      - name: Attest Docker image with SBOM
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2.4.0
        with:
          subject-path: rewelo-mcp-*-oci.tar.gz
          sbom-path: sbom.json

      - name: Generate changelog
        run: |
          node scripts/changelog.mjs "$GITHUB_REF_NAME" | tee release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body_path: release-notes.md
          files: |
            rewelo-*.tgz
            rewelo-mcp-*-oci.tar.gz
            sbom.json
            CHANGELOG.md
