name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build Docker image
        run: |
          VERSION=$(node -p "require('./package.json').version")
          docker build --build-arg APP_VERSION="$VERSION" -t rewelo-mcp .

      - name: Verify Docker image runs
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
            | docker run --rm -i --init --cap-drop=ALL -v rw-ci-data:/data rewelo-mcp serve \
            | head -1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['result']['serverInfo']['name']=='rewelo', f'unexpected: {d}'"
